{% extends "base.html" %}

{% block title %}
Profile
{% endblock %}

{% block body %}

<div class="container mt-5">

    <div class="card shadow">
        <div class="card-body text-center">

            <h2>👤 My Profile</h2>
            <hr>

            <h4>{{ name }}</h4>

            <p class="text-muted">
                Welcome to your Smart Interview Practice Platform account.
            </p>

            <table class="table mt-4">
                <tr>
                    <th>Name</th>
                    <td>{{ name }}</td>
                </tr>

                <tr>
                    <th>Email</th>
                    <td>{{ email }}</td>
                </tr>

                <tr>
                    <th>Role</th>
                    <td>Student</td>
                </tr>

                <tr>
                    <th>Joined</th>
                    <td>Recently</td>
                </tr>
            </table>

        </div>
    </div>

</div>

{% endblock %}
